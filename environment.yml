# =============================================================================
# Conda environment for sleepdata-experiments
#
# Create:   conda env create -f environment.yml
# Activate: conda activate sleepdata
# Update:   conda env update -f environment.yml --prune
#
# After activating, install the NSRR download tool:
#   gem install nsrr
# =============================================================================

name: sleepdata

channels:
  - pytorch
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - ruby          # required for: gem install nsrr

  # Data & ML
  - pandas
  - numpy
  - scipy
  - scikit-learn
  - joblib

  # Visualisation
  - matplotlib
  - seaborn

  # Utilities
  - tqdm
  - requests

  # PyTorch with CUDA 12.1 (driver 581.57 / CUDA 13.0 on this machine)
  - pytorch::pytorch=2.1.0=py3.11_cuda12.1_cudnn8_0
  - pytorch::torchvision=0.16.0
  - pytorch::pytorch-cuda=12.1

  # pip-only packages
  - pip
  - pip:
    - mne
    - tsfel
    - xgboost
    - shap
    - imbalanced-learn
    - tensorboard
    - python-dotenv
