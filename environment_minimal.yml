# =============================================================================
# Minimal conda environment for sleepdata-experiments
# Top-level dependencies only (use environment.yml for exact versions).
# =============================================================================

name: sleepdata

channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pandas
  - numpy
  - scipy
  - scikit-learn
  - matplotlib
  - seaborn
  - tqdm
  - requests
  - pip
  - pip:
    - mne
    - tsfel
    - xgboost
    - python-dotenv
